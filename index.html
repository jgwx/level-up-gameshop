<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой первый сайт</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            padding: 20px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }
    </style>
</head>
<body>

<header>
    <h1>Добро пожаловать на мой сайт</h1>
</header>

<nav>
    <a href="#">Главная</a>
    <a href="#">Обо мне</a>
    <a href="#">Контакты</a>
</nav>

<div class="container">
    <h2>Мой первый сайт</h2>
    <p>Это простой сайт, созданный с помощью HTML, CSS и JavaScript.</p>

    <button onclick="showMessage()">Нажми меня</button>
</div>

<footer>
    © 2026 Мой сайт
</footer>

<script>
function showMessage() {
    alert("Спасибо за нажатие!");
}
</script>

</body>
</html>
